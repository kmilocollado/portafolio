######################## default configuration ####################
baseURL = "https://kmilo_collado.gitlab.io/portafolio/"
title = "Kmilo Collado"
defaultContentLanguage = "es"
languageCode = "es"
theme = "somrat"
# post pagination
paginate = "5"
# post excerpt
summaryLength = "10"


# disable language
disableLanguages = [] # disable language from here
# google analutics
googleAnalytics = "" # example : UA-123-45
# disqus short name
disqusShortname = "" # get your shortname form here : https://disqus.com



############################# Outputs ##############################
[outputs]
home = ["HTML"]

[markup.goldmark.renderer]
unsafe= true

