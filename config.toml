#################### default parameters ################################
[params]
favicon = "images/favicon.png"
logo_light = "images/logo-light.png"
logo_dark = "images/logo-dark.png"
logo_width = "150px"
css = ["css/style.css"]
# Meta data
description = "Mi portafolio Kmilo Collado"
author = "kmilo"
whatsapp_num = "+5352391362"
cv = "docs/CV.pdf"

# Preloader
[params.preloader]
enable = true
preloader = "images/preloader.gif" # use jpg, png, svg or gif format.
  
